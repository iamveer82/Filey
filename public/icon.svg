<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <clipPath id="rounded">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#rounded)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle grid pattern for depth -->
    <line x1="0" y1="170" x2="512" y2="170" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="341" x2="512" y2="341" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    <line x1="170" y1="0" x2="170" y2="512" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>
    <line x1="341" y1="0" x2="341" y2="512" stroke="#1E293B" stroke-width="0.5" opacity="0.5"/>

    <!-- Glow effect behind the letter -->
    <circle cx="256" cy="256" r="160" fill="#2563EB" opacity="0.06"/>
    <circle cx="256" cy="256" r="120" fill="#2563EB" opacity="0.04"/>

    <!-- Stylized F letterform — geometric, modern -->
    <!-- Main vertical stroke -->
    <rect x="152" y="120" width="52" height="272" rx="8" fill="white"/>

    <!-- Top horizontal stroke -->
    <rect x="152" y="120" width="208" height="48" rx="8" fill="white"/>

    <!-- Middle horizontal stroke with accent -->
    <rect x="152" y="232" width="160" height="44" rx="8" fill="url(#accent)"/>

    <!-- Accent dot / flourish — bottom right -->
    <circle cx="348" cy="340" r="24" fill="url(#accent)"/>
  </g>
</svg>